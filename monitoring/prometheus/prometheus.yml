global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: producer
    metrics_path: /metrics
    static_configs:
      - targets: ["producer-app:8080"]
        labels:
          app: producer

  - job_name: consumer
    metrics_path: /metrics
    static_configs:
      - targets: ["consumer-app:8080"]
        labels:
          app: consumer
