# Pinned images (update intentionally when upgrading):
#   apache/kafka:3.9.0 | opensearch + dashboards 2.17.1 | prom/prometheus:v2.55.1 | grafana/grafana:11.3.0
services:
  producer-app:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer-app
    volumes:
      - ./producer:/app
    ports:
      - "${PRODUCER_OBS_HOST_PORT:-8080}:8080"
    environment:
      PYTHONUNBUFFERED: "1"
      WIKIMEDIA_STREAM_URL: ${WIKIMEDIA_STREAM_URL:-https://stream.wikimedia.org/v2/stream/recentchange}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-broker:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-wikimedia.recentchange}
      KAFKA_CLIENT_RETRY_MAX_ATTEMPTS: ${KAFKA_CLIENT_RETRY_MAX_ATTEMPTS:-10}
      KAFKA_CLIENT_RETRY_DELAY_SECONDS: ${KAFKA_CLIENT_RETRY_DELAY_SECONDS:-5}
      OBS_HTTP_PORT: ${OBS_HTTP_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      broker:
        condition: service_healthy
    networks:
      - pwko-net
  
  consumer-app:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: consumer-app
    volumes:
      - ./consumer:/app
    ports:
      - "${CONSUMER_OBS_HOST_PORT:-8081}:8080"
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-broker:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-wikimedia.recentchange}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-wikimedia-consumer-group}
      OPENSEARCH_HOST: ${OPENSEARCH_HOST:-opensearch-node1}
      OPENSEARCH_PORT: ${OPENSEARCH_PORT:-9200}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX:-wikimedia-changes}
      OPENSEARCH_USE_SSL: ${OPENSEARCH_USE_SSL:-false}
      OPENSEARCH_USER: ${OPENSEARCH_USER:-}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-}
      OPENSEARCH_VERIFY_CERTS: ${OPENSEARCH_VERIFY_CERTS:-}
      OPENSEARCH_CA_CERTS: ${OPENSEARCH_CA_CERTS:-}
      OPENSEARCH_SSL_ASSERT_HOSTNAME: ${OPENSEARCH_SSL_ASSERT_HOSTNAME:-true}
      KAFKA_CLIENT_RETRY_MAX_ATTEMPTS: ${KAFKA_CLIENT_RETRY_MAX_ATTEMPTS:-10}
      KAFKA_CLIENT_RETRY_DELAY_SECONDS: ${KAFKA_CLIENT_RETRY_DELAY_SECONDS:-5}
      OPENSEARCH_RETRY_MAX_ATTEMPTS: ${OPENSEARCH_RETRY_MAX_ATTEMPTS:-20}
      OPENSEARCH_RETRY_DELAY_SECONDS: ${OPENSEARCH_RETRY_DELAY_SECONDS:-5}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-wikimedia.recentchange.dlq}
      OBS_HTTP_PORT: ${OBS_HTTP_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      broker:
        condition: service_healthy
      opensearch-node1:
        condition: service_healthy
      opensearch-node2:
        condition: service_healthy
    networks:
      - pwko-net
  
  broker:
    image: apache/kafka:3.9.0
    container_name: broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://broker:9092,CONTROLLER://broker:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server broker:9092 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    networks:
      - pwko-net
  
  opensearch-node1:
    image: opensearchproject/opensearch:2.17.1
    container_name: opensearch-node1
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.seed_hosts=opensearch-node1,opensearch-node2
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:9200/_cluster/health | grep -qE '\"status\"\\s*:\\s*\"(green|yellow)\"' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - pwko-net
  
  opensearch-node2:
    image: opensearchproject/opensearch:2.17.1
    container_name: opensearch-node2
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node2
      - discovery.seed_hosts=opensearch-node1,opensearch-node2
      - cluster.initial_cluster_manager_nodes=opensearch-node1,opensearch-node2
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - plugins.security.disabled=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data2:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:9200/_cluster/health | grep -qE '\"status\"\\s*:\\s*\"(green|yellow)\"' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - pwko-net
  
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    expose:
      - "5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch-node1:9200","http://opensearch-node2:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    networks:
      - pwko-net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    depends_on:
      - producer-app
      - consumer-app
    networks:
      - pwko-net

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - pwko-net

  # Run tests in Docker: mounts source + Docker socket for Testcontainers (--integration).
  # Usage: docker compose --profile test run --rm test-runner pytest tests/ -v
  test-runner:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile.test
    working_dir: /app
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal

volumes:
  opensearch-data1:
  opensearch-data2:
  prometheus-data:
  grafana-data:


networks:
  pwko-net:
    driver: bridge
